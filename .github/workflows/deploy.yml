name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_USE_MOCK: 'false'
          VITE_API_URL: 'https://healthai-backend-67ta.onrender.com/api'
        run: npm run build

      - name: Create 404.html for SPA routing
        run: |
          cat > frontend/dist/404.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <script>
                var seg = 1;
                var l = window.location;
                l.replace(
                  l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                  l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?p=' +
                  encodeURIComponent(l.pathname.slice(1).split('/').slice(seg).join('/')) +
                  (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
                  l.hash
                );
              </script>
            </head>
            <body></body>
          </html>
          HTMLEOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
